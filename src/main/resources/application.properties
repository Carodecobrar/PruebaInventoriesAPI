spring.application.name=inventories
#BD
spring.datasource.url=jdbc:postgresql://localhost:5433/inventory_db
spring.datasource.username=prueba
spring.datasource.password=Prueb4
spring.datasource.driver-class-name=org.postgresql.Driver
#Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
#Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
#Puertos
server.port=8081
#Secrets
products.service.url=http://localhost:8080
products.service.apiKeyValue=$2a$12$QEKgijszxHIM0YLIOluDNumEyJ8e6xzQfHNiUqwUa.48UteHaazJS
products.service.apiKeyHeader=X-API-Key
#Resilience4j
resilience4j.circuitbreaker.instances.productsClient.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.productsClient.slidingWindowSize=10
resilience4j.circuitbreaker.instances.productsClient.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.productsClient.failureRateThreshold=50
resilience4j.circuitbreaker.instances.productsClient.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.productsClient.permittedNumberOfCallsInHalfOpenState=3
#Logs estructurados
logging.structured.format.console=ecs
logging.file.name=log.json
logging.structured.format.file=ecs
#Health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true